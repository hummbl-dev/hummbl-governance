name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: test (py${{ matrix.python-version }})
    runs-on: [self-hosted, windows, python-ci, anvil, windows-general]
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[test]"
      - run: python -m pytest tests/ -v --cov=hummbl_governance --cov-report=term --cov-fail-under=80

  install-smoke:
    name: install-smoke (py${{ matrix.python-version }})
    runs-on: [self-hosted, windows, python-ci, anvil, windows-general]
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install build frontend
        run: python -m pip install build
      - name: Build sdist and wheel
        run: python -m build --sdist --wheel --outdir dist-smoke
      - name: Build wheel from sdist
        run: python scripts/build_wheel_from_sdist.py
      - name: Install wheel built from sdist
        run: python scripts/install_wheel_from_sdist.py
      - name: Smoke test — installed wheel console scripts and data files
        run: python scripts/smoke_installed_wheel.py

  lint:
    name: lint
    runs-on: [self-hosted, windows, python-ci, anvil, windows-general]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check .

  arbiter-governance:
    name: arbiter-governance
    runs-on: [self-hosted, windows, python-ci, anvil, windows-general]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Arbiter with analyzers
        run: pip install "arbiter-dev[analyzers]"
      - name: Arbiter Audit
        run: python scripts/arbiter_audit.py

  coverage-matrix-validate:
    name: coverage-matrix-validate (advisory)
    runs-on: [self-hosted, windows, python-ci, anvil, windows-general]
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[test]"
      - name: Validate coverage matrix evidence cells
        run: python scripts/validate_coverage_matrices.py
      - name: Regenerate evidence-validation report
        run: python scripts/build_evidence_validation_report.py

  ci:
    name: ci-aggregate
    runs-on: [self-hosted, windows, python-ci, anvil, windows-general]
    needs:
      - test
      - install-smoke
      - lint
      - arbiter-governance
      - coverage-matrix-validate
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify required CI jobs
        env:
          NEEDS_TEST_RESULT: ${{ needs.test.result }}
          NEEDS_INSTALL_SMOKE_RESULT: ${{ needs['install-smoke'].result }}
          NEEDS_LINT_RESULT: ${{ needs.lint.result }}
          NEEDS_ARBITER_GOVERNANCE_RESULT: ${{ needs['arbiter-governance'].result }}
          NEEDS_COVERAGE_MATRIX_VALIDATE_RESULT: ${{ needs['coverage-matrix-validate'].result }}
        run: python scripts/verify_ci_jobs.py
