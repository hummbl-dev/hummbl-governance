name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: test (py${{ matrix.python-version }})
    runs-on: [self-hosted, windows, python-ci, anvil, windows-general]
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        id: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          '& "${{ steps.setup-python.outputs.python-path }}" -m pip install --upgrade pip'
          '& "${{ steps.setup-python.outputs.python-path }}" -m pip install -e ".[test]"'

      - name: Run tests with coverage
        run: |
          '& "${{ steps.setup-python.outputs.python-path }}" -m pytest tests/ -v --cov=hummbl_governance --cov-report=term --cov-fail-under=80'

  install-smoke:
    name: install-smoke (py${{ matrix.python-version }})
    runs-on: [self-hosted, windows, python-ci, anvil, windows-general]
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        id: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install build frontend
        run: '& "${{ steps.setup-python.outputs.python-path }}" -m pip install build'

      - name: Build sdist and wheel
        run: '& "${{ steps.setup-python.outputs.python-path }}" -m build --sdist --wheel --outdir dist-smoke'

      - name: Build wheel from sdist
        run: '& "${{ steps.setup-python.outputs.python-path }}" scripts/build_wheel_from_sdist.py'

      - name: Install wheel built from sdist
        run: '& "${{ steps.setup-python.outputs.python-path }}" scripts/install_wheel_from_sdist.py'

      - name: Smoke test — installed wheel console scripts and data files
        run: '& "${{ steps.setup-python.outputs.python-path }}" scripts/smoke_installed_wheel.py'

  lint:
    name: lint
    runs-on: [self-hosted, windows, python-ci, anvil, windows-general]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        id: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: '& "${{ steps.setup-python.outputs.python-path }}" -m pip install ruff'

      - name: Run ruff check
        run: ruff check .

  arbiter-governance:
    name: arbiter-governance
    runs-on: [self-hosted, windows, python-ci, anvil, windows-general]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        id: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Arbiter with analyzers
        run: '& "${{ steps.setup-python.outputs.python-path }}" -m pip install "arbiter-dev[analyzers]"'

      - name: Arbiter Audit
        run: '& "${{ steps.setup-python.outputs.python-path }}" scripts/arbiter_audit.py'

  coverage-matrix-validate:
    name: coverage-matrix-validate (advisory)
    runs-on: [self-hosted, windows, python-ci, anvil, windows-general]
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        id: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: '& "${{ steps.setup-python.outputs.python-path }}" -m pip install -e ".[test]"'

      - name: Validate coverage matrix evidence cells
        run: '& "${{ steps.setup-python.outputs.python-path }}" scripts/validate_coverage_matrices.py'

      - name: Regenerate evidence-validation report
        run: '& "${{ steps.setup-python.outputs.python-path }}" scripts/build_evidence_validation_report.py'

  ci:
    name: ci-aggregate
    runs-on: [self-hosted, windows, python-ci, anvil, windows-general]
    needs:
      - test
      - install-smoke
      - lint
      - arbiter-governance
      - coverage-matrix-validate
    if: always()
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        id: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify required CI jobs
        env:
          NEEDS_TEST_RESULT: ${{ needs.test.result }}
          NEEDS_INSTALL_SMOKE_RESULT: ${{ needs['install-smoke'].result }}
          NEEDS_LINT_RESULT: ${{ needs.lint.result }}
          NEEDS_ARBITER_GOVERNANCE_RESULT: ${{ needs['arbiter-governance'].result }}
          NEEDS_COVERAGE_MATRIX_VALIDATE_RESULT: ${{ needs['coverage-matrix-validate'].result }}
        run: '& "${{ steps.setup-python.outputs.python-path }}" scripts/verify_ci_jobs.py'
