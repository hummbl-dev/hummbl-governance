name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON: C:\gitea\runner\toolcache\Python\3.13.13\x64\python.exe

jobs:
  test:
    runs-on: [self-hosted, windows, python-ci, anvil, windows-general]
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        shell: powershell
        run: '& "$env:PYTHON" -m pip install -e ".[test]"'
      - name: Run tests
        shell: powershell
        run: '& "$env:PYTHON" -m pytest tests/ -v --cov=hummbl_governance --cov-report=term --cov-fail-under=80'

  install-smoke:
    runs-on: [self-hosted, windows, python-ci, anvil, windows-general]
    steps:
      - uses: actions/checkout@v4
      - name: Install build frontend
        shell: powershell
        run: '& "$env:PYTHON" -m pip install build'
      - name: Build sdist and wheel
        shell: powershell
        run: '& "$env:PYTHON" -m build --sdist --wheel --outdir dist-smoke'
      - name: Build wheel from sdist
        shell: powershell
        run: '& "$env:PYTHON" scripts/build_wheel_from_sdist.py'
      - name: Install wheel built from sdist
        shell: powershell
        run: '& "$env:PYTHON" scripts/install_wheel_from_sdist.py'
      - name: Smoke test — installed wheel console scripts and data files
        shell: powershell
        run: '& "$env:PYTHON" scripts/smoke_installed_wheel.py'

  lint:
    runs-on: [self-hosted, windows, python-ci, anvil, windows-general]
    steps:
      - uses: actions/checkout@v4
      - name: Install ruff
        shell: powershell
        run: '& "$env:PYTHON" -m pip install ruff'
      - name: Run ruff
        shell: powershell
        run: '& "$env:PYTHON" -m ruff check .'

  arbiter-governance:
    runs-on: [self-hosted, windows, python-ci, anvil, windows-general]
    steps:
      - uses: actions/checkout@v4
      - name: Install Arbiter with analyzers
        shell: powershell
        run: '& "$env:PYTHON" -m pip install "arbiter-dev[analyzers]"'
      - name: Arbiter Audit
        shell: powershell
        run: '& "$env:PYTHON" scripts/arbiter_audit.py'

  coverage-matrix-validate:
    name: coverage-matrix-validate (advisory)
    runs-on: [self-hosted, windows, python-ci, anvil, windows-general]
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        shell: powershell
        run: '& "$env:PYTHON" -m pip install -e ".[test]"'
      - name: Validate coverage matrix evidence cells
        shell: powershell
        run: '& "$env:PYTHON" scripts/validate_coverage_matrices.py'
      - name: Regenerate evidence-validation report
        shell: powershell
        run: '& "$env:PYTHON" scripts/build_evidence_validation_report.py'

  ci:
    name: ci-aggregate
    runs-on: [self-hosted, windows, python-ci, anvil, windows-general]
    needs:
      - test
      - install-smoke
      - lint
      - arbiter-governance
      - coverage-matrix-validate
    if: always()
    steps:
      - uses: actions/checkout@v4
      - name: Verify required CI jobs
        shell: powershell
        env:
          NEEDS_TEST_RESULT: ${{ needs.test.result }}
          NEEDS_INSTALL_SMOKE_RESULT: ${{ needs['install-smoke'].result }}
          NEEDS_LINT_RESULT: ${{ needs.lint.result }}
          NEEDS_ARBITER_GOVERNANCE_RESULT: ${{ needs['arbiter-governance'].result }}
          NEEDS_COVERAGE_MATRIX_VALIDATE_RESULT: ${{ needs['coverage-matrix-validate'].result }}
        run: '& "$env:PYTHON" scripts/verify_ci_jobs.py'
