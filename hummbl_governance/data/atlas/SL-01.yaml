id: SL-01
title: "Base LLM Scaling"
status: empirically.tested
candidate_law_statement: "Loss and capability follow empirical power laws with model parameters N, dataset size D, and training compute C. Compute-optimal training balances model size and tokens."
falsification_criterion: "Overfitting when N >> D; undertraining when C insufficient; deviation from power-law fit in controlled sweep."
