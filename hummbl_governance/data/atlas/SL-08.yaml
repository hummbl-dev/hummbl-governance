id: SL-08
title: "Human Oversight Scaling"
status: candidate.accepted
candidate_law_statement: "Oversight capacity is bounded by attention, context load, review latency, and fatigue; high-stakes work needs steeper escalation curves."
falsification_criterion: "Review quality drops >20% when agent count doubles at fixed human headcount."
