# Notes
notes: |
  GPU-derived exponents differ from CPU (SL-EXP003):
  - alpha: 0.432 (GPU) vs 0.367 (CPU) — params matter MORE on GPU
  - beta: 0.381 (GPU) vs 0.128 (CPU) — data matters MORE on GPU
  - R^2: 0.865 (GPU) vs 0.962 (CPU) — higher variance on GPU
  
  Possible explanations:
  1. GPU batch dynamics (64 vs 32/64 CPU) change convergence
  2. JAX JIT compilation introduces different numerical behavior
  3. Fewer eval steps (250 vs 500) gives noisier loss estimates
  
  This finding suggests scaling laws may be hardware-dependent,
  which has implications for cross-platform model training.

