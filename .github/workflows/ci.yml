name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[test]"
      - run: python -m pytest tests/ -v --cov=hummbl_governance --cov-report=term --cov-fail-under=80

  install-smoke:
    name: install-smoke (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install build frontend
        run: python -m pip install build
      - name: Build sdist and wheel
        run: python -m build --sdist --wheel --outdir dist-smoke
      - name: Build wheel from sdist
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import subprocess
          import sys

          sdists = list(Path("dist-smoke").glob("hummbl_governance-*.tar.gz"))
          if len(sdists) != 1:
              raise SystemExit(f"expected exactly one sdist, found {len(sdists)}: {sdists}")
          subprocess.check_call([
              sys.executable,
              "-m",
              "pip",
              "wheel",
              str(sdists[0]),
              "--no-deps",
              "--wheel-dir",
              "dist-from-sdist",
          ])
          PY
      - name: Install wheel built from sdist
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import subprocess
          import sys

          wheels = list(Path("dist-from-sdist").glob("hummbl_governance-*.whl"))
          if len(wheels) != 1:
              raise SystemExit(f"expected exactly one wheel, found {len(wheels)}: {wheels}")
          subprocess.check_call([
              sys.executable,
              "-m",
              "pip",
              "install",
              "--force-reinstall",
              "--no-deps",
              str(wheels[0]),
          ])
          PY
      - name: Smoke test — installed wheel console scripts and data files
        run: python scripts/smoke_installed_wheel.py

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check .

  release-readiness-gate:
    name: release readiness gate (PR/docs parity)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tools
        run: pip install build
      - name: Build package
        run: python -m build --sdist --wheel --outdir dist/release-gate
      - name: Verify release metadata and built-long-description parity
        run: |
          WHEEL_PATH="$(ls dist/release-gate/*.whl | head -n1)"
          if [ -z "$WHEEL_PATH" ]; then
            echo "Expected at least one built wheel in dist/release-gate/"
            exit 1
          fi
          python scripts/check_release_metadata.py --wheel "$WHEEL_PATH"

  arbiter-governance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Arbiter with analyzers
        run: pip install "arbiter-dev[analyzers]==0.2.0"
      - name: Arbiter Audit
        run: |
          python - <<'PY'
          import json
          import subprocess
          import sys

          result = subprocess.run(
              ["arbiter", "score", ".", "--json"],
              capture_output=True,
              text=True,
          )
          sys.stdout.write(result.stdout)
          sys.stderr.write(result.stderr)
          if result.returncode != 0:
              raise SystemExit(result.returncode)

          payload_start = result.stdout.find("{")
          if payload_start == -1:
              raise SystemExit("arbiter score did not emit JSON output")

          report = json.loads(result.stdout[payload_start:])
          score = float(report["overall"])
          if score < 90.0:
              raise SystemExit(f"Arbiter score {score} is below the 90.0 threshold")

          print(f"Arbiter score {score} meets threshold")
          PY

  coverage-matrix-validate:
    name: coverage-matrix-validate
    runs-on: ubuntu-latest
    # Ratchet gate promoted 2026-06-26: validated_pct reached 100.0% (1404/1404).
    # Per ADR-007, continue-on-error flipped to false once promotion threshold
    # (50%) was crossed. Ratchet baseline = 1404 validated rows.
    # Tracked by: hummbl-dev/hummbl-governance#128
    continue-on-error: false
    outputs:
      ratchet-result: ${{ steps.ratchet.outputs.ratchet_result }}
      validated-count: ${{ steps.ratchet.outputs.validated_count }}
      validated-pct: ${{ steps.ratchet.outputs.validated_pct }}
      clean-pass: ${{ steps.ratchet.outputs.clean_pass }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[test]"
      - name: Validate coverage matrix evidence cells
        run: |
          MATRICES_DIR="docs/coverage"
          if [ ! -d "$MATRICES_DIR" ]; then
            echo "No coverage matrices directory - skipping validation"
            exit 0
          fi
          FAILED=0
          for matrix in "$MATRICES_DIR"/*.md; do
            [ -f "$matrix" ] || continue
            base=$(basename "$matrix")
            # Skip generated reports, the index, and the ratchet baseline
            case "$base" in
              README.md|EVIDENCE_VALIDATION.md) continue ;;
            esac
            echo "Validating: $matrix"
            python -m hummbl_governance.compliance_mapper \
              --validate "$matrix" \
              --repo-root . \
              || FAILED=1
          done
          if [ "$FAILED" -ne 0 ]; then
            echo "::warning::Coverage matrix validation: one or more matrices have unresolved evidence references (advisory; matrices are DRAFT scaffolds)"
            exit 0
          fi
          echo "All coverage matrices pass evidence validation"
      - name: Regenerate evidence-validation report
        run: |
          python scripts/build_evidence_validation_report.py
          echo "::group::EVIDENCE_VALIDATION.md summary"
          head -40 docs/coverage/EVIDENCE_VALIDATION.md
          echo "::endgroup::"
      - name: Ratchet gate
        id: ratchet
        run: |
          python scripts/coverage_ratchet.py \
            --baseline docs/coverage/ratchet-baseline.json \
            --report docs/coverage/EVIDENCE_VALIDATION.json \
            --promote-threshold 50.0
          RATCHET_RC=$?
          # Extract current stats from the report for job outputs
          VALIDATED=$(python3 -c "import json; d=json.load(open('docs/coverage/EVIDENCE_VALIDATION.json')); print(sum(v['fulfilled_validation']['rows_passed'] for v in d.values()))")
          FULFILLED=$(python3 -c "import json; d=json.load(open('docs/coverage/EVIDENCE_VALIDATION.json')); print(sum(v['totals']['fulfilled'] for v in d.values()))")
          PCT=$(python3 -c "import json; d=json.load(open('docs/coverage/EVIDENCE_VALIDATION.json')); f=sum(v['totals']['fulfilled'] for v in d.values()); v=sum(v['fulfilled_validation']['rows_passed'] for v in d.values()); print(round(100.0*v/f,1) if f else 0.0)")
          echo "ratchet_result=$([ $RATCHET_RC -eq 0 ] && echo pass || echo fail)" >> $GITHUB_OUTPUT
          echo "validated_count=$VALIDATED" >> $GITHUB_OUTPUT
          echo "validated_pct=$PCT" >> $GITHUB_OUTPUT
          # clean_pass = true only if ALL rows validate (no failures)
          FAILED_COUNT=$(python3 -c "import json; d=json.load(open('docs/coverage/EVIDENCE_VALIDATION.json')); print(sum(v['fulfilled_validation']['rows_failed'] for v in d.values()))")
          echo "clean_pass=$([ $FAILED_COUNT -eq 0 ] && echo true || echo false)" >> $GITHUB_OUTPUT
          # Ratchet failure is advisory for now (continue-on-error on the job)
          # but the output distinguishes ratchet-fail from ratchet-pass
          if [ $RATCHET_RC -ne 0 ]; then
            echo "::warning::Ratchet gate FAILED — validated count regressed below baseline"
          fi

  ci:
    runs-on: ubuntu-latest
    needs:
      - test
      - install-smoke
      - lint
      - release-readiness-gate
      - arbiter-governance
      - coverage-matrix-validate
    if: always()
    steps:
      - name: Verify required CI jobs
        run: |
          failed=0
          check_result() {
            job="$1"
            result="$2"
            if [ "$result" != "success" ]; then
              echo "$job finished with result: $result"
              failed=1
            fi
          }
          check_result test "${{ needs.test.result }}"
          check_result install-smoke "${{ needs['install-smoke'].result }}"
          check_result lint "${{ needs.lint.result }}"
          check_result release-readiness-gate "${{ needs['release-readiness-gate'].result }}"
          check_result arbiter-governance "${{ needs['arbiter-governance'].result }}"
          check_result coverage-matrix-validate "${{ needs['coverage-matrix-validate'].result }}"
          echo "--- Coverage matrix ratchet status ---"
          echo "  ratchet_result: ${{ needs['coverage-matrix-validate'].outputs.ratchet-result }}"
          echo "  validated_count: ${{ needs['coverage-matrix-validate'].outputs.validated-count }}"
          echo "  validated_pct: ${{ needs['coverage-matrix-validate'].outputs.validated-pct }}%"
          echo "  clean_pass: ${{ needs['coverage-matrix-validate'].outputs.clean-pass }}"
          exit "$failed"
