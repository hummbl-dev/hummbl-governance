name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[test]"
      - run: python -m pytest tests/ -v --cov=hummbl_governance --cov-report=term --cov-fail-under=80

  install-smoke:
    name: install-smoke (${{ matrix.os }}, ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Clean install from PyPI
        run: pip install hummbl-governance
      - name: Smoke test — all primitives importable
        run: |
          python -c "
          from hummbl_governance import (
              KillSwitch, CircuitBreaker, CostGovernor, BusWriter,
              DelegationTokenManager, AgentRegistry, OutputValidator,
              ReasoningEngine, BehaviorMonitor, SchemaValidator,
              CapabilityFence, ComplianceMapper, ConvergenceDetector,
              LamportClock, GovernanceLifecycle, ContractNetManager,
              StrideMapper, AuditLog, HealthCollector
          )
          print('All 19 primitives imported successfully')
          "
      - name: Verify zero dependencies
        run: |
          python -c "
          import importlib.metadata
          requires = importlib.metadata.requires('hummbl-governance') or []
          runtime = [r for r in requires if 'extra ==' not in r]
          assert len(runtime) == 0, f'Unexpected runtime deps: {runtime}'
          print('Zero runtime dependencies confirmed')
          "

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check .

  arbiter-governance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Arbiter with analyzers
        run: pip install "arbiter-dev[analyzers]"
      - name: Arbiter Audit
        run: |
          python - <<'PY'
          import json
          import subprocess
          import sys

          result = subprocess.run(
              ["arbiter", "score", ".", "--json"],
              capture_output=True,
              text=True,
          )
          sys.stdout.write(result.stdout)
          sys.stderr.write(result.stderr)
          if result.returncode != 0:
              raise SystemExit(result.returncode)

          payload_start = result.stdout.find("{")
          if payload_start == -1:
              raise SystemExit("arbiter score did not emit JSON output")

          report = json.loads(result.stdout[payload_start:])
          score = float(report["overall"])
          if score < 90.0:
              raise SystemExit(f"Arbiter score {score} is below the 90.0 threshold")

          print(f"Arbiter score {score} meets threshold")
          PY

  coverage-matrix-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[test]"
      - name: Validate coverage matrix evidence cells
        run: |
          MATRICES_DIR="docs/coverage"
          if [ ! -d "$MATRICES_DIR" ]; then
            echo "No coverage matrices directory — skipping validation"
            exit 0
          fi
          FAILED=0
          for matrix in "$MATRICES_DIR"/*.md; do
            [ -f "$matrix" ] || continue
            echo "Validating: $matrix"
            python -m hummbl_governance.compliance_mapper \
              --validate "$matrix" \
              --repo-root . \
              --validate-json || FAILED=1
          done
          if [ "$FAILED" -ne 0 ]; then
            echo "Coverage matrix validation failed — phantom evidence references detected"
            exit 1
          fi
          echo "All coverage matrices pass evidence validation"
