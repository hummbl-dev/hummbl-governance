name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7
        with:
          python-version: '3.12'

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Verify release metadata before publish
        run: |
          WHEEL_PATH="$(ls dist/*.whl | head -n1)"
          if [ -z "$WHEEL_PATH" ]; then
            echo "No wheel artifact found in dist/"
            exit 1
          fi
          python scripts/check_release_metadata.py --wheel "$WHEEL_PATH"

      - name: Upload build artifacts
        actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: dist
          path: dist/

  publish-testpypi:
    needs: build
    runs-on: ubuntu-latest
    environment: testpypi
    steps:
      - actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247 # release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          password: ${{ secrets.TEST_PYPI_TOKEN }}
          skip-existing: true

  validate-testpypi:
    needs: publish-testpypi
    runs-on: ubuntu-latest
    steps:
      - actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7
        with:
          python-version: '3.12'

      - name: Wait for TestPyPI indexing
        run: sleep 15

      - name: Install from TestPyPI
        run: |
          pip install --index-url https://test.pypi.org/simple/ \
            --extra-index-url https://pypi.org/simple/ \
            hummbl-governance

      - name: Smoke test
        run: python -c "import hummbl_governance; print('TestPyPI install OK')"

  publish:
    needs: validate-testpypi
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    environment: pypi
    steps:
      - actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247 # release/v1
        with:
          skip-existing: true
