name: adr-lint

on:
  pull_request:
    paths:
      - "docs/adr/**"
      - "tools/adr_lint.py"
  push:
    branches: [main]
    paths:
      - "docs/adr/**"
      - "tools/adr_lint.py"

jobs:
  adr-format-check:
    runs-on: ubuntu-latest
    steps:
      - actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7
        with:
          python-version: "3.12"
      - name: Lint ADR files
        run: python tools/adr_lint.py docs/adr/ --ci
